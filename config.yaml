# ============================================================================
# ENVIRONMENT VARIABLES REQUIRED
# ============================================================================
# Before starting the collector, set these environment variables:
#
# Required:
#   export DT_ENDPOINT="https://zhy38306.live.dynatrace.com/api/v2/otlp"
#   export DT_API_TOKEN="your-dynatrace-api-token"
#
# Optional:
#   export PROCESS_MEMORY_THRESHOLD_BYTES=52428800  # Default: 50MB
#
# Process Memory Threshold:
#   - Processes < threshold: Grouped into "short_lived_processes" entity
#   - Processes >= threshold: Individual entities in Dynatrace
#   - Common values: 10MB=10485760, 25MB=26214400, 50MB=52428800, 100MB=104857600
#
# Prometheus Scraping:
#   - This collector scrapes Spring Boot Prometheus metrics from localhost:8080/actuator/prometheus
#   - Scrape interval: 30 seconds
#   - All metrics are sent to Dynatrace via OTLP HTTP
# ============================================================================

exporters:
  otlphttp:
    endpoint: "${env:DT_ENDPOINT}"
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"
  debug:

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  # Prometheus scraper for Spring Boot actuator metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'spring-boot-app'
          scrape_interval: 30s
          scrape_timeout: 10s
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: ['localhost:8080']
              labels:
                application: 'rest-service'
                environment: 'production'
                service: 'java-rest-api'
  
  filelog:
    include:
      # Debian/Ubuntu logs
      - /var/log/syslog
      - /var/log/auth.log
      - /var/log/kern.log
      # RHEL/CentOS/Amazon Linux logs
      - /var/log/messages
      - /var/log/secure
      # Common application logs
      - /var/log/cron
      - /var/log/maillog
      - /var/log/boot.log
    include_file_name: true
    include_file_path: true
    operators:
      - type: move
        from: attributes["log.file.name"]
        to: resource["log.file.name"]
      - type: move
        from: attributes["log.file.path"]
        to: resource["log.file.path"]
  hostmetrics/1m:
    collection_interval: 1m
    scrapers:
      # CPU metrics
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
          system.cpu.time:
            enabled: false

      # Memory metrics
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
          system.memory.usage:
            enabled: false

      # Load average metrics
      load:
        metrics:
          system.cpu.load_average.1m:
            enabled: true
          system.cpu.load_average.5m:
            enabled: false
          system.cpu.load_average.15m:
            enabled: false

  hostmetrics/5m:
    collection_interval: 5m
    scrapers:
      # CPU metrics
      cpu:
        metrics:
          system.cpu.time:
            enabled: true

      # Memory metrics
      memory:
        metrics:
          system.memory.usage:
            enabled: true

      # Paging/Swap metrics
      paging:
        metrics:
          system.paging.usage:
            enabled: true
          system.paging.operations:
            enabled: true
          system.paging.faults:
            enabled: true

      # Network metrics
      network:
        metrics:
          system.network.io:
            enabled: true
          system.network.packets:
            enabled: true
          system.network.errors:
            enabled: true
          system.network.connections:
            enabled: true
          system.network.dropped:
            enabled: true

      # Load average metrics
      load:
        metrics:
          system.cpu.load_average.1m:
            enabled: false
          system.cpu.load_average.5m:
            enabled: true
          system.cpu.load_average.15m:
            enabled: true

      # Disk metrics
      disk:
        metrics:
          system.disk.io:
            enabled: true
          system.disk.operations:
            enabled: true
          system.disk.io_time:
            enabled: true
          system.disk.operation_time:
            enabled: true
          system.disk.pending_operations:
            enabled: false
          system.disk.merged:
            enabled: false
          system.disk.weighted_io_time:
            enabled: false

      # Filesystem metrics
      filesystem:
        metrics:
          system.filesystem.usage:
            enabled: true
          system.filesystem.utilization:
            enabled: true
          system.filesystem.inodes.usage:
            enabled: true

      # Process count metrics
      processes:
        metrics:
          system.processes.count:
            enabled: true
          system.processes.created:
            enabled: true

      # Per-process metrics
      process:
        mute_process_all_errors: true
        metrics:
          process.cpu.utilization:
            enabled: true
          process.cpu.time:
            enabled: true
          process.memory.usage:
            enabled: true
          process.memory.virtual:
            enabled: true
          process.disk.io:
            enabled: true

  hostmetrics/1h:
    collection_interval: 1h
    scrapers:
      # Memory metrics
      memory:
        metrics:
          system.memory.limit:
            enabled: true
          system.memory.usage:
            enabled: false

      # CPU metrics
      cpu:
        metrics:
          system.cpu.logical.count:
            enabled: true
          system.cpu.physical.count:
            enabled: true
          system.cpu.time:
            enabled: false

      # System metrics
      system:
        metrics:
          system.uptime:
            enabled: true

processors:
  # ============================================================================
  # PROCESS MEMORY THRESHOLD CONFIGURATION
  # ============================================================================
  # Set environment variable to change the memory threshold for process filtering:
  #   export PROCESS_MEMORY_THRESHOLD_BYTES=52428800
  #
  # What this does:
  #   - Processes using < threshold: Grouped into single "short_lived_and_system_processes" entity
  #   - Processes using >= threshold: Reported as individual entities to Dynatrace
  #   - Reduces entity cardinality in Dynatrace to prevent hitting 2nd Gen limits
  #
  # Default: 50 MB (52428800 bytes)
  # Examples:
  #   - 100 MB: export PROCESS_MEMORY_THRESHOLD_BYTES=104857600
  #   - 25 MB:  export PROCESS_MEMORY_THRESHOLD_BYTES=26214400
  #   - 10 MB:  export PROCESS_MEMORY_THRESHOLD_BYTES=10485760
  #
  # To count short-lived processes in Dynatrace, use this DQL query:
  #   timeseries count = countDistinct(process.instance_id), by: {process.executable.name}
  #   | filter process.executable.name == "short_lived_and_system_processes"
  # ============================================================================
  
  filter:
    metrics:
      datapoint:
        - metric.name == "system.cpu.utilization" and attributes["state"] == "idle"
        # Drop CPU and disk metrics for low-memory processes (we'll keep only memory metrics to count them)
        - (metric.name == "process.cpu.utilization" or metric.name == "process.cpu.time" or metric.name == "process.disk.io") and resource.attributes["process.memory_category"] == "short_lived"
  transform:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          # Convert host.ip from array to single string value (take first IP) if it's not already a string
          - set(attributes["host.ip"], attributes["host.ip"][0]) where IsString(attributes["host.ip"]) == false and attributes["host.ip"] != nil
      - context: datapoint
        statements:
          # Categorize processes based on memory consumption (threshold set via PROCESS_MEMORY_THRESHOLD_BYTES env var)
          # Mark processes with memory < threshold as "short_lived", others as "significant"
          - set(resource.attributes["process.memory_category"], "short_lived") where metric.name == "process.memory.usage" and ((value_int != nil and value_int < ${env:PROCESS_MEMORY_THRESHOLD_BYTES:-52428800}) or (value_double != nil and value_double < ${env:PROCESS_MEMORY_THRESHOLD_BYTES:-52428800}))
          - set(resource.attributes["process.memory_category"], "significant") where metric.name == "process.memory.usage" and ((value_int != nil and value_int >= ${env:PROCESS_MEMORY_THRESHOLD_BYTES:-52428800}) or (value_double != nil and value_double >= ${env:PROCESS_MEMORY_THRESHOLD_BYTES:-52428800}))
      - context: resource
        statements:
          # Group all short-lived processes into a single entity
          - set(attributes["process.executable.name"], "short_lived_and_system_processes") where attributes["process.memory_category"] == "short_lived"
          - set(attributes["process.command"], "aggregated_short_lived_and_system_processes") where attributes["process.memory_category"] == "short_lived"
          # Replace spaces in process command line with underscores for cleaner entity IDs
          - replace_pattern(attributes["process.command_line"], " ", "_") where attributes["process.memory_category"] != "short_lived"
      - context: datapoint
        statements:
          # For short-lived processes, copy PID to metric dimension BEFORE deleting resource attributes
          - set(attributes["process.instance_id"], resource.attributes["process.pid"]) where IsMatch(metric.name, "^process\\..*") and resource.attributes["process.memory_category"] == "short_lived"
          # For process.* metrics, keep only the attributes needed by the OpenTelemetry Host extension and remove the rest
          - delete_key(resource.attributes, "process.cgroup") where IsMatch(metric.name, "^process\\..*")
          - delete_key(resource.attributes, "process.command") where IsMatch(metric.name, "^process\\..*") and resource.attributes["process.memory_category"] != "short_lived"
          - delete_key(resource.attributes, "process.executable.path") where IsMatch(metric.name, "^process\\..*")
          - delete_key(resource.attributes, "process.owner") where IsMatch(metric.name, "^process\\..*")
          - delete_key(resource.attributes, "process.parent_pid") where IsMatch(metric.name, "^process\\..*")
          # Delete process.pid for all processes 
          - delete_key(resource.attributes, "process.pid") where IsMatch(metric.name, "^process\\..*")
          - delete_key(resource.attributes, "process.command_line") where IsMatch(metric.name, "^process\\..*") and resource.attributes["process.memory_category"] != "short_lived"
          - delete_key(resource.attributes, "process.command_args") where IsMatch(metric.name, "^process\\..*")
          # CRITICAL: Remove process.memory_category from resource attributes for short-lived to ensure identical resources
          - delete_key(resource.attributes, "process.memory_category") where IsMatch(metric.name, "^process\\..*") and resource.attributes["process.memory_category"] == "short_lived"
          # Delete empty device attributes
          - delete_key(attributes, "device") where attributes["device"] == ""
          - delete_key(attributes, "protocol") where IsMatch(metric.name, "^system\\.network\\..*")
          # Filesystem metrics: Extension uses mountpoint and state, but not device, mode, or type
          - delete_key(attributes, "device") where IsMatch(metric.name, "^system\\.filesystem\\..*")
          - delete_key(attributes, "mode") where IsMatch(metric.name, "^system\\.filesystem\\..*")
          - delete_key(attributes, "type") where IsMatch(metric.name, "^system\\.filesystem\\..*")
      - context: metric
        statements:
          - aggregate_on_attributes("sum", ["cpu"]) where name == "system.cpu.utilization"
      - context: datapoint
        statements:
          - delete_key(attributes, "cpu") where metric.name == "system.cpu.utilization"
      - context: metric
        statements:
          # Average remaining datapoints (one per core) into a single host-level value
          - aggregate_on_attributes("mean") where name == "system.cpu.utilization"
  batch:
    send_batch_size: 3000
    send_batch_max_size: 3000
    timeout: 60s
  cumulativetodelta:
    max_staleness: 25h
  resourcedetection:
    detectors: ["system"]
    system:
      resource_attributes:
        host.arch:
          enabled: true
        host.id:
          enabled: true
        host.name:
          enabled: true
        host.ip:
          enabled: true
        host.mac:
          enabled: true
        # Note: host.cpu.model.name, host.interface, os.name, os.version, os.build.id 
        # may not be supported in this collector version
  resource:
    attributes:
      - key: dt.security_context
        value: "sec-lvl-3"
        action: upsert

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [hostmetrics/1m, hostmetrics/5m, hostmetrics/1h, prometheus]
      processors: [filter, resourcedetection, resource, transform, cumulativetodelta, batch]
      exporters: [otlphttp, debug]
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [otlphttp, debug]
    logs:
      receivers: [otlp, filelog]
      processors: [resourcedetection, batch]
      exporters: [otlphttp]

  # turn on self-monitoring
  telemetry:
    metrics:
      # metrics verbosity level. Higher verbosity means more metrics.
      # The dashboard relies on metrics at level detailed.
      level: detailed
      # set up OTLP exporter
      readers:
        - periodic:
            interval: 60000
            exporter:
              otlp:
                protocol: http/protobuf
                temporality_preference: delta
                endpoint: "${env:DT_ENDPOINT}/v1/metrics"
                headers:
                  Authorization: "Api-Token ${env:DT_API_TOKEN}"
