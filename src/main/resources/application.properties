# Actuator endpoints configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# HTTP server metrics with histogram buckets
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,300ms,500ms,1s,2s,5s

# Custom metrics buckets
management.metrics.distribution.percentiles-histogram.greeting.api=true
management.metrics.distribution.slo.greeting.api=50ms,100ms,200ms,300ms,500ms,1s,2s,5s

# OTLP Direct Export to Dynatrace
management.metrics.export.otlp.enabled=true
management.metrics.export.otlp.url=${DT_ENDPOINT:https://zhy38306.live.dynatrace.com/api/v2/otlp}/v1/metrics
management.metrics.export.otlp.headers.Authorization=Api-Token ${DT_API_TOKEN}
management.metrics.export.otlp.step=30s
management.metrics.export.otlp.resource-attributes.application=rest-service-otlp
management.metrics.export.otlp.resource-attributes.environment=production
management.metrics.export.otlp.resource-attributes.service=java-rest-api-otlp
